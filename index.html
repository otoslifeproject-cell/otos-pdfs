<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<title>OTOS Family — Review Wall</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { --s: 0.34; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #14110e; font-family: 'Inter', system-ui, sans-serif; color: #f4efe6; }
  .bar {
    position: sticky; top: 0; z-index: 50; display: flex; align-items: center; gap: 22px;
    padding: 12px 20px; background: rgba(15,12,10,.94); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,.1);
  }
  .bar .brand { font-weight: 950; letter-spacing: -.01em; font-size: 15px; }
  .bar .brand span { color: #f26c0d; }
  .bar .hint { font-size: 11px; color: #aeb4c0; font-weight: 600; }
  .bar .prog { font-size: 11px; font-weight: 800; letter-spacing: .04em; color: #35d07f; }
  .bar .right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  .bar .zoom { display: flex; align-items: center; gap: 10px; font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: #aeb4c0; }
  .bar input[type=range] { width: 180px; accent-color: #f26c0d; }
  .bar button {
    font: inherit; font-size: 11px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
    color: #f4efe6; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16);
    border-radius: 999px; padding: 7px 14px; cursor: pointer;
  }
  .bar button:hover { background: rgba(242,108,13,.2); border-color: rgba(242,108,13,.5); }

  .wall { display: flex; gap: 18px; padding: 18px 20px 80px; align-items: flex-start; width: max-content; }
  .col { flex: 0 0 auto; }
  .col .head {
    position: sticky; top: 64px; z-index: 20; background: rgba(20,16,13,.96); backdrop-filter: blur(8px);
    padding: 9px 12px; border-radius: 10px 10px 0 0; border: 1px solid rgba(255,255,255,.12); border-bottom: none;
    display: flex; align-items: center; gap: 8px; margin-bottom: 0;
  }
  .col .head .tx { display: flex; flex-direction: column; gap: 2px; }
  .col .head .t { font-size: 12px; font-weight: 900; letter-spacing: -.01em; line-height: 1.2; }
  .col .head .m { font-size: 9.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #f26c0d; }
  .col .head .cprog { margin-left: auto; font-size: 9.5px; font-weight: 900; letter-spacing: .04em; color: #aeb4c0; white-space: nowrap; }
  .col .head .cprog.done { color: #35d07f; }

  .frame-wrap { position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,.12); border-top: none; background: #0c0a08; border-radius: 0 0 10px 10px; }
  .frame-wrap iframe { border: 0; transform-origin: top left; background: #2a2a2a; display: block; }

  /* per-page approval overlay */
  .ov { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
  .pg { position: absolute; left: 0; }
  .pg .wash {
    position: absolute; inset: 0; pointer-events: none; transition: background .15s, box-shadow .15s;
    background: rgba(20,16,13,.34); /* unapproved = dimmed, so approved pages "pop" */
  }
  .pg.ok .wash { background: rgba(53,208,127,.16); box-shadow: inset 0 0 0 2px rgba(53,208,127,.7); }
  .pg .tick {
    position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto;
    background: rgba(15,12,10,.82); border: 1.5px solid rgba(255,255,255,.4); backdrop-filter: blur(4px);
    color: transparent; font-size: 15px; font-weight: 900; line-height: 1; transition: all .15s;
  }
  .pg .tick:hover { border-color: #35d07f; }
  .pg.ok .tick { background: #35d07f; border-color: #35d07f; color: #06210f; }
  .pg .num {
    position: absolute; top: 8px; left: 8px; font-size: 10px; font-weight: 900; letter-spacing: .04em;
    background: rgba(15,12,10,.82); color: #f4efe6; padding: 4px 7px; border-radius: 6px; pointer-events: none;
    border: 1px solid rgba(255,255,255,.18);
  }
  .pg.ok .num { color: #35d07f; border-color: rgba(53,208,127,.5); }

  .col .open { display:block; margin-top:8px; text-align:center; font-size:10px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:#aeb4c0; text-decoration:none; padding:6px; border:1px solid rgba(255,255,255,.12); border-radius:8px; }
  .col .open:hover { color:#f4efe6; border-color:rgba(242,108,13,.5); }
</style>
</head>
<body>
  <div class="bar">
    <div class="brand">OTOS Family — <span>Review Wall</span></div>
    <div class="hint">Scroll ↓ pages · → docs · tick a page to approve</div>
    <div class="prog" id="prog">0 / 0 approved</div>
    <div class="right">
      <div class="zoom">
        <button id="clearBtn" title="Clear all ticks">Clear ticks</button>
        <button id="fitBtn" title="Reset zoom">Reset zoom</button>
        <span>Zoom</span>
        <input id="zoom" type="range" min="0.18" max="0.92" step="0.02" value="0.34" />
      </div>
    </div>
  </div>
  <div class="wall" id="wall"></div>

<script>
  const PAGE_W = 794, PAGE_H = 1123, GAP = 18, PAD = 30;
  const DOCS = [
    { f: "OTOS NIA Paper v3.html", n: "NIA Paper", m: "Parent · 23pp", p: 23 },
    { f: "OTOS Angel Brief v3.html", n: "Angel / Funder Brief", m: "Investor · 13pp", p: 13 },
    { f: "OTOS Executive Overview.html", n: "Executive Overview", m: "Elevator · 5pp", p: 5 },
    { f: "AZ NIA Master Brief v3.html", n: "AstraZeneca Master Brief", m: "Benchmark · 22pp", p: 22 },
    { f: "OTOS Evidence Dossier v2.html", n: "Evidence Dossier", m: "Proof vault · 10pp", p: 10 },
    { f: "ADHD Team Project Brief v1.html", n: "ADHD Team", m: "Clinical · 11pp", p: 11 },
    { f: "CGL and CRS Team Leaders Brief v3.html", n: "CGL & CRS", m: "Partner · 11pp", p: 11 },
    { f: "Alcohol Liaison Bedside Brief v3.html", n: "Alcohol Liaison", m: "Partner · 11pp", p: 11 },
    { f: "Dr Claire Gillvray LAMP Strategic Ally Brief v3.html", n: "Dr Claire / LAMP", m: "Ally · 12pp", p: 12 },
    { f: "RCE Wellbeing Hub Partner Brief v3.html", n: "RCE Wellbeing Hub", m: "Partner · 11pp", p: 11 },
    { f: "Mind WorkWell Therapy Partner Brief v3.html", n: "Mind / WorkWell", m: "Partner · 11pp", p: 11 },
    { f: "Public Health Cost Case Brief v3.html", n: "Public Health Cost Case", m: "Commissioner · 12pp", p: 12 },
    { f: "Champion Brief v3.html", n: "Champion Brief", m: "Champion · 8pp", p: 8 }
  ];

  const LS_KEY = "otos-review-approvals-v1";
  let approved = {};
  try { approved = JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch (e) { approved = {}; }
  const keyFor = (f, k) => f + "##" + k;
  function save() { try { localStorage.setItem(LS_KEY, JSON.stringify(approved)); } catch (e) {} }

  const wall = document.getElementById('wall');
  const cols = [];
  let totalPages = 0;

  for (const d of DOCS) {
    totalPages += d.p;
    const docH = d.p * PAGE_H + (d.p - 1) * GAP + PAD * 2;
    const col = document.createElement('div');
    col.className = 'col';
    col.innerHTML =
      '<div class="head"><div class="tx"><div class="t">' + d.n + '</div><div class="m">' + d.m + '</div></div><div class="cprog"></div></div>' +
      '<div class="frame-wrap"><iframe scrolling="no"></iframe><div class="ov"></div></div>' +
      '<a class="open" href="' + encodeURI(d.f) + '" target="_blank" rel="noopener">Open full \u2197</a>';
    wall.appendChild(col);
    const fr = col.querySelector('iframe');
    fr.src = d.f;
    const ov = col.querySelector('.ov');
    const pgs = [];
    for (let k = 1; k <= d.p; k++) {
      const pg = document.createElement('div');
      pg.className = 'pg';
      pg.innerHTML = '<div class="wash"></div><div class="num">' + String(k).padStart(2, '0') + '</div><div class="tick">\u2713</div>';
      if (approved[keyFor(d.f, k)]) pg.classList.add('ok');
      const tick = pg.querySelector('.tick');
      tick.addEventListener('click', () => {
        const kk = keyFor(d.f, k);
        if (approved[kk]) { delete approved[kk]; pg.classList.remove('ok'); }
        else { approved[kk] = true; pg.classList.add('ok'); }
        save(); updateProg();
      });
      ov.appendChild(pg);
      pgs.push(pg);
    }
    cols.push({ el: col, wrap: col.querySelector('.frame-wrap'), frame: fr, ov, pgs, docH, d, cprog: col.querySelector('.cprog') });
  }

  function apply(s) {
    document.documentElement.style.setProperty('--s', s);
    for (const c of cols) {
      c.frame.style.width = PAGE_W + 'px';
      c.frame.style.height = c.docH + 'px';
      c.frame.style.transform = 'scale(' + s + ')';
      c.wrap.style.width = (PAGE_W * s) + 'px';
      c.wrap.style.height = (c.docH * s) + 'px';
      c.el.style.width = (PAGE_W * s) + 'px';
      c.pgs.forEach((pg, i) => {
        pg.style.top = ((PAD + i * (PAGE_H + GAP)) * s) + 'px';
        pg.style.width = (PAGE_W * s) + 'px';
        pg.style.height = (PAGE_H * s) + 'px';
      });
    }
  }

  function updateProg() {
    let done = 0;
    for (const c of cols) {
      let cd = 0;
      for (let k = 1; k <= c.d.p; k++) if (approved[keyFor(c.d.f, k)]) cd++;
      done += cd;
      c.cprog.textContent = cd + ' / ' + c.d.p;
      c.cprog.classList.toggle('done', cd === c.d.p);
    }
    document.getElementById('prog').textContent = done + ' / ' + totalPages + ' approved';
  }

  const zoom = document.getElementById('zoom');
  zoom.addEventListener('input', () => apply(parseFloat(zoom.value)));
  document.getElementById('fitBtn').addEventListener('click', () => { zoom.value = 0.34; apply(0.34); });
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!confirm('Clear ALL approval ticks across every document?')) return;
    approved = {}; save();
    cols.forEach(c => c.pgs.forEach(pg => pg.classList.remove('ok')));
    updateProg();
  });

  apply(0.34);
  updateProg();
</script>
</body>
</html>
